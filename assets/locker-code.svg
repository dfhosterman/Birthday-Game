<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" role="img" aria-labelledby="title desc">
  <title id="title">Penguin placeholder for locker code</title>
  <desc id="desc">A playful penguin holding a sign that says locker code placeholder.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f6ff"/>
